version: '3.8'

services:
  web:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: water-gis-web
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    volumes:
      - ../../logs:/app/logs
    depends_on:
      - database
      - redis
    restart: unless-stopped

  database:
    image: postgis/postgis:15-3.3
    container_name: water-gis-db
    environment:
      POSTGRES_DB: water_resource_gis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: water-gis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
